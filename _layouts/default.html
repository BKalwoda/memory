<!doctype html>
<html lang="{{ site.lang | default: 'en' }}" data-theme="light">
<head>
{% include head.html %}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  {% include nav.html %}
  <main id="main" class="container site-main" tabindex="-1">
    {{ content }}
  </main>
  {% include footer.html %}
  <script src="{{ '/assets/js/theme.js' | relative_url }}" defer></script>
  {% if page.scripts %}
    {% for src in page.scripts %}
      <script src="{{ src | relative_url }}" defer></script>
    {% endfor %}
  {% endif %}
</body>
</html>
