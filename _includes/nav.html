<header class="site-header" role="banner">
  <div class="container nav-inner">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title | escape }} home">
      <span class="brand-mark" aria-hidden="true">◆</span>
      <span class="brand-name">{{ site.title | escape }}</span>
    </a>

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primary-nav" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>

    <nav id="primary-nav" class="primary-nav" aria-label="Primary">
      <ul>
        {% for item in site.data.navigation %}
          {% assign current = false %}
          {% if page.url == item.url %}{% assign current = true %}{% endif %}
          <li><a href="{{ item.url | relative_url }}"{% if current %} aria-current="page"{% endif %}>{{ item.title }}</a></li>
        {% endfor %}
      </ul>
      {% include theme-toggle.html %}
    </nav>
  </div>
</header>
