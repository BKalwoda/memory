<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">

<title>{% if page.title %}{{ page.title | escape }} · {{ site.title | escape }}{% else %}{{ site.title | escape }} — {{ site.tagline | escape }}{% endif %}</title>
<meta name="description" content="{{ page.summary | default: page.description | default: site.description | strip_html | normalize_whitespace | truncate: 180 | escape }}">

<link rel="canonical" href="{{ page.url | absolute_url }}">
<link rel="alternate" type="application/atom+xml" title="{{ site.title | escape }}" href="{{ '/feed.xml' | relative_url }}">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}">

<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

{%- comment -%}
  Set the theme before paint to avoid flash-of-wrong-theme. Reads localStorage,
  falls back to prefers-color-scheme.
{%- endcomment -%}
<script>
  (function () {
    try {
      var stored = localStorage.getItem('memory-theme');
      var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>
